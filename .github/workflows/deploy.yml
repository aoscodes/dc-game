name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all components regardless of changed paths"
        type: boolean
        default: false

jobs:
  # Detect which parts of the codebase changed so downstream jobs can skip
  # work that isn't needed.  dorny/paths-filter compares the push against the
  # previous commit on the branch (or the merge-base for PRs).
  changes:
    runs-on: ubuntu-24.04
    outputs:
      server:  ${{ steps.filter.outputs.server }}
      client:  ${{ steps.filter.outputs.client }}
      web:     ${{ steps.filter.outputs.web }}
      setup:   ${{ steps.filter.outputs.setup }}
      browser: ${{ steps.filter.outputs.browser }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'src/server/**'
              - 'src/shared/**'
              - 'src/debug/**'
              - 'src/root.zig'
              - 'build.zig'
              - 'build.zig.zon'
            client:
              - 'src/client/**'
              - 'src/shared/**'
              - 'src/root.zig'
              - 'build.zig'
              - 'build.zig.zon'
              - 'bridge/**'
            web:
              - 'web/**'
            setup:
              - 'scripts/vps-setup.sh'
            browser:
              - 'e2e/browser/**'
              - 'src/client/**'
              - 'src/server/**'
              - 'src/shared/**'
              - 'bridge/**'
              - 'web/**'

  # ------------------------------------------------------------------
  # Build server — runs tests and e2e, produces the server binary
  # ------------------------------------------------------------------

  build-server:
    needs: changes
    if: needs.changes.outputs.server == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: install zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: cache zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkgs-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkgs-

      - name: unit tests
        run: zig build test

      - name: e2e test
        run: zig build e2e

      - name: build server (ReleaseSafe)
        run: zig build server -Doptimize=ReleaseSafe -Dcpu=baseline

      - name: upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: zig-out/bin/server
          retention-days: 7

  # ------------------------------------------------------------------
  # Build client — compiles the headless Zig binary (Linux x86-64) and
  # bundles it with the Node bridge so they can be deployed together.
  # No Raylib, no WASM, no Emscripten.
  # ------------------------------------------------------------------

  build-client:
    needs: changes
    if: needs.changes.outputs.client == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: install zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: cache zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkgs-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkgs-

      - name: build client (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe -Dcpu=baseline

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: install bridge npm deps
        run: npm ci
        working-directory: bridge

      - name: bundle client artifact
        run: |
          mkdir -p deploy/bridge deploy/zig-out/bin
          cp zig-out/bin/client          deploy/zig-out/bin/client
          cp bridge/index.js             deploy/bridge/index.js
          cp bridge/package.json         deploy/bridge/package.json
          cp bridge/package-lock.json    deploy/bridge/package-lock.json

      - name: upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-bundle
          path: deploy/
          retention-days: 7

  # ------------------------------------------------------------------
  # Browser e2e — Playwright + headless Chromium
  # Requires server + client binaries, so depends on build-server and
  # build-client (which upload their artifacts).
  # ------------------------------------------------------------------

  browser-e2e:
    needs: [changes, build-server, build-client]
    if: needs.changes.outputs.browser == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: download server artifact
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: zig-out/bin/

      - name: download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-bundle
          path: deploy/

      - name: place client binary
        run: |
          mkdir -p zig-out/bin
          cp deploy/zig-out/bin/client zig-out/bin/client
          chmod +x zig-out/bin/server zig-out/bin/client

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/browser/package-lock.json

      - name: install browser e2e deps
        run: npm ci
        working-directory: e2e/browser

      - name: install playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e/browser

      - name: run browser e2e
        run: npx playwright test
        working-directory: e2e/browser

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/browser/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # Deploy jobs
  # ------------------------------------------------------------------

  deploy-server:
    needs: [changes, build-server]
    if: needs.changes.outputs.server == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - name: download server artifact
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: deploy/

      - name: scp server binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "deploy/server"
          target:   "/tmp/dragoncon-deploy/zig-out/bin/"
          strip_components: 1

      - name: install binary and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /usr/bin/install -o dragoncon -g dragoncon -m 755 \
              /tmp/dragoncon-deploy/zig-out/bin/server \
              /opt/dragoncon/server
            sudo systemctl restart dragoncon-server
            rm -rf /tmp/dragoncon-deploy

  deploy-client:
    needs: [changes, build-client]
    if: needs.changes.outputs.client == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - name: download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-bundle
          path: deploy/

      - name: scp client bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "deploy/*"
          target:   "/tmp/dragoncon-deploy/"
          strip_components: 1

      - name: install client binary + bridge and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /usr/bin/install -o dragoncon -g dragoncon -m 755 \
              /tmp/dragoncon-deploy/zig-out/bin/client \
              /opt/dragoncon/client
            sudo rsync -a --delete /tmp/dragoncon-deploy/bridge/ /opt/dragoncon/bridge/
            cd /opt/dragoncon/bridge && sudo -u dragoncon npm ci --omit=dev
            sudo systemctl restart dragoncon-bridge
            rm -rf /tmp/dragoncon-deploy

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: scp static web assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "web/*"
          target:   "/var/www/dragoncon/"
          strip_components: 1

  deploy-setup:
    needs: changes
    if: needs.changes.outputs.setup == 'true' || inputs.deploy_all == true
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: push setup script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "scripts/vps-setup.sh"
          target:   "~/"
          strip_components: 1
