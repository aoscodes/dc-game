name: build-and-deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: install zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # Raylib links X11/GL/Wayland system libs on Linux.
      # Required for zig build test, zig build server, and zig build e2e.
      - name: install raylib system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libglx-dev libgl1-mesa-dev \
            libwayland-dev libwayland-bin wayland-scanner++ \
            libegl1-mesa-dev

      # Cache zig package fetches across runs (keyed on build.zig.zon)
      - name: cache zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkgs-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkgs-

      - name: unit tests
        run: zig build test

      - name: e2e test
        run: zig build e2e

      - name: build server (ReleaseSafe)
        run: zig build server -Doptimize=ReleaseSafe

      # WASM build — raylib-zig bootstraps its own emsdk from the package
      # dependency in build.zig.zon; no system emcc required.
      - name: build wasm client (ReleaseSmall)
        run: zig build -Dtarget=wasm32-emscripten -Doptimize=ReleaseSmall

      # Bundle hand-written web assets alongside the emscripten output and
      # stage everything into deploy/ with a known flat layout:
      #   deploy/server        — game server binary
      #   deploy/web/          — WASM client + HTML/JS assets
      - name: stage artifacts
        run: |
          mkdir -p deploy/web
          cp zig-out/bin/server deploy/server
          cp zig-out/web/client.wasm zig-out/web/client.js deploy/web/
          cp web/index.html web/ws_glue.js deploy/web/

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dragoncon-artifacts
          path: deploy/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      # download-artifact@v4 extracts into path: so deploy/ is restored exactly
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dragoncon-artifacts
          path: deploy/

      - name: deploy web assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/web/*"
          target: "/var/www/dragoncon/"
          strip_components: 2

      - name: deploy server binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/server"
          target: "/tmp/"

      - name: install binary and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo install -o dragoncon -g dragoncon -m 755 \
              /tmp/server \
              /opt/dragoncon/server
            sudo systemctl restart dragoncon-server
            rm -f /tmp/server
