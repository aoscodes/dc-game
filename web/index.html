<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DragonCon Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script src="ws_glue.js"></script>
<script>
"use strict";

const wsGlue = createWsGlue();
const protocol = location.protocol === "https:" ? "wss:" : "ws:";
const serverUrl = `${protocol}//${location.hostname}/ws`;

window.Module = {
  canvas: document.getElementById("canvas"),
  print(text)    { console.log("[game]", text); },
  printErr(text) { console.warn("[game:err]", text); },

  onRuntimeInitialized() {
    wsGlue.register(window.Module);
    // Write server URL into g_server_url_buf and connect.
    // Player name stays as the Zig default ("Player").
    const mod = window.Module;
    const enc = new TextEncoder().encode(serverUrl);
    const mem = new Uint8Array(mod.wasmMemory.buffer);
    mem.set(enc, mod._g_server_url_buf);
    mem[mod._g_server_url_buf + enc.length] = 0;
    mod._start_connect();
  },
};

const script = document.createElement("script");
script.src = "client.js";
document.body.appendChild(script);
</script>
</body>
</html>
